<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário sem &lt;br&gt; — CSS moderno</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="iframe-section">
        <iframe width="560" height="315" src="https://www.youtube.com/embed/cDA3_5982h8?si=1x3pGCKdmdt_NOus" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
    <div class="form-card">
        <h2> Formulário limpo</h2>
        <div class="sub">Estrutura básica de formulário</div>

        <form action="#" method="post">
            <!-- Nome -->
            <div class="field-group">
                <label for="nome"> Seu nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>
            </div>

            <!-- Idade -->
            <div class="field-group">
                <label for="idade"> Idade</label>
                <input type="number" id="idade" name="idade" placeholder="25" min="0" max="130" step="1" required>
            </div>

            <!-- Site / URL -->
            <div class="field-group">
                <label for="site"> Seu site</label>
                <input type="url" id="site" name="site" placeholder="https://google.com">
            </div>

            <!-- Data -->
            <div class="field-group">
                <label for="data"> Data</label>
                <input type="date" id="data" name="data">
            </div>

            <!-- E-mail -->
            <div class="field-group">
                <label for="email"> E-mail</label>
                <input type="email" id="email" name="email" placeholder="email@email.com" required>
            </div>

            <!-- Checkbox (totalmente sem <br>) -->
            <div class="checkbox-wrapper">
                <input type="checkbox" id="termos" name="termos">
                <label for="termos" class="checkbox-label"> Concordo com os termos de serviço.</label>
            </div>

            <h3>Tipo de Ingresso:</h3>
            <div class="radio-group">
                <input type="radio" name="radio-option" id="inteira" value="inteira">
                <label for="inteira">Inteira</label>
                <input type="radio" name="radio-option" id="meia" value="meia">
                <label for="meia">Meia</label>
                <input type="radio" name="radio-option" id="vip" value="vip">
                <label for="vip">VIP</label>
            </div>

            <div class="select-group">
                <label for="">Forma de pagamento</label>
                <select>
                    <option disabled selected>Selecione sua opção</option>
                    <option value="credito">Cartão de crédito</option>
                    <option value="debito">Cartão de débito</option>
                    <option value="pix">PIX</option>
                </select>
            </div>
            
            <!-- Botão de envio -->
            <button type="submit" class="btn-submit">
                <span>Enviar formulário</span>
            </button>

            <div class="no-br-example">
                Zero &lt;br&gt; — tudo espaçado com margin, flexbox e grid mental.
            </div>
        </form>
    </div>

    
</body>
</html>
