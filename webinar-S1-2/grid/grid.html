<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="grid.css">
    <title>Grid</title>
</head>
<body>

    <h2 class="title">Exemplos Grid</h2>

    <div class="section">

        <div class="card">
            <h3>Display Grid (básico):</h3>
            <div class="example-grid">
                <p>1</p><p>2</p><p>3</p>
                <p>4</p><p>5</p><p>6</p>
                <p>7</p><p>8</p><p>9</p>
            </div>
        </div>

        <div class="card">
            <h3>Grid 2 colunas:</h3>
            <div class="example-grid-2">
                <p>1</p><p>2</p>
                <p>3</p><p>4</p>
                <p>5</p><p>6</p>
                <p>7</p><p>8</p>
            </div>
        </div>

        <div class="card">
            <h3>Grid responsivo (3 → 2 → 1):</h3>
            <div class="example-grid-responsive">
                <p>1</p><p>2</p><p>3</p>
                <p>4</p><p>5</p><p>6</p>
                <p>7</p><p>8</p><p>9</p>
                <p>10</p><p>11</p><p>12</p>
            </div>
        </div>

    </div>

</body>
</html>
